- name: Deploy Node.js App
  hosts: app
  become: yes

  tasks:

    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install Node.js and npm
      apt:
        name:
          - nodejs
          - npm
        state: present

    - name: Remove old app directory (if exists)
      file:
        path: /home/ubuntu/app
        state: absent

    - name: Clone GitHub repository
      git:
        repo: "https://github.com/AruneshDwivedi/AWS-CI-CD-Pipeline-for-Node.js-Application-Deployment.git"
        dest: /home/ubuntu/app
        version: main

    - name: Install Node.js dependencies
      command: npm install
      args:
        chdir: /home/ubuntu/app/app

    - name: Stop existing app (if running)
      shell: "pkill -f 'node app.js' || true"
      ignore_errors: yes

    - name: Start Node.js app
      shell: "nohup npm start > app.log 2>&1 &"
      args:
        chdir: /home/ubuntu/app/app